<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>공부 기록</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="공부기록">
  <meta name="theme-color" content="#0F1724">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0F1724;--card:#1A2640;--card2:#223050;
      --accent:#F5A623;--accent-dim:rgba(245,166,35,0.14);
      --text:#E8EDF5;--muted:#7A8BA8;--border:#2A3D5C;
      --green:#4CAF82;--red:#E06B6B;
    }
    body{
      background:var(--bg);color:var(--text);
      font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
      min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:84px;
    }

    /* HEADER */
    .header{
      padding:52px 20px 14px;
      position:sticky;top:0;z-index:10;
      background:var(--bg);
    }
    .hd-date{font-size:12px;color:var(--accent);font-weight:600;letter-spacing:.06em;margin-bottom:3px}
    .hd-title{font-size:21px;font-weight:700}
    .hd-sub{font-size:12px;color:var(--muted);margin-top:2px}

    /* BOTTOM NAV */
    .bnav{
      position:fixed;bottom:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:430px;
      background:var(--card);border-top:1px solid var(--border);
      display:flex;z-index:100;
    }
    .ni{
      flex:1;display:flex;flex-direction:column;align-items:center;
      padding:10px 0 14px;gap:4px;cursor:pointer;
      color:var(--muted);font-size:11px;transition:color .2s;
    }
    .ni.active{color:var(--accent)}
    .ni svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2}

    /* SCREENS */
    .screen{display:none;padding:0 16px}
    .screen.active{display:block}

    /* SECTION */
    .slabel{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;padding:0 2px}
    .section{margin-bottom:18px}

    /* TIME ROW */
    .time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .tcard{
      background:var(--card);border:1px solid var(--border);
      border-radius:14px;padding:14px 16px;position:relative;
    }
    .tcard-label{font-size:12px;color:var(--muted);margin-bottom:6px}
    input[type="time"].tinput{
      background:transparent;border:none;color:var(--text);
      font-size:26px;font-weight:700;width:100%;outline:none;font-family:inherit;
    }
    input[type="time"]::-webkit-calendar-picker-indicator{
      opacity:0;position:absolute;right:0;top:0;width:100%;height:100%;cursor:pointer;
    }

    /* SUBJECT CARDS */
    .scard{
      background:var(--card);border:1px solid var(--border);
      border-radius:14px;padding:14px 16px;margin-bottom:10px;
      transition:border-color .2s;
    }
    .scard:focus-within{border-color:var(--accent)}
    .sc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .sc-name{font-size:14px;font-weight:700}
    .sc-badge{font-size:11px;color:var(--accent);background:var(--accent-dim);padding:2px 9px;border-radius:20px}
    textarea.snote{
      background:var(--card2);border:1px solid var(--border);
      border-radius:10px;padding:10px 12px;color:var(--text);
      font-size:14px;font-family:inherit;width:100%;resize:none;
      outline:none;min-height:58px;line-height:1.5;
    }
    textarea.snote::placeholder{color:var(--muted)}
    textarea.snote:focus{border-color:var(--accent)}
    .fromto-row{display:flex;align-items:center;gap:6px;margin-top:8px}
    .fromto-label{font-size:12px;color:var(--muted);flex-shrink:0}
    input.ftime{
      background:var(--card2);border:1px solid var(--border);
      border-radius:8px;color:var(--text);font-size:14px;font-weight:600;
      font-family:inherit;width:86px;padding:5px 6px;text-align:center;outline:none;
      position:relative;
    }
    input.ftime:focus{border-color:var(--accent)}
    input.ftime::-webkit-calendar-picker-indicator{
      opacity:0;position:absolute;right:0;top:0;width:100%;height:100%;cursor:pointer;
    }
    .fromto-arrow{color:var(--muted);font-size:14px;flex-shrink:0}
    .dur-badge{
      font-size:12px;font-weight:700;color:var(--accent);
      background:var(--accent-dim);padding:3px 10px;border-radius:20px;
      flex-shrink:0;min-width:52px;text-align:center;
    }
    .dur-badge.empty{color:var(--muted);background:rgba(122,139,168,.1)}

    /* SAVE BUTTON */
    .save-btn{
      width:100%;padding:16px;background:var(--accent);
      color:#0F1724;font-size:16px;font-weight:700;font-family:inherit;
      border:none;border-radius:14px;cursor:pointer;margin-top:4px;
      transition:opacity .15s;
    }
    .save-btn:active{opacity:.82}

    /* TOAST */
    .toast{
      position:fixed;bottom:92px;left:50%;
      transform:translateX(-50%) translateY(12px);
      background:var(--green);color:#fff;font-size:14px;font-weight:600;
      padding:11px 24px;border-radius:30px;
      opacity:0;transition:all .3s;z-index:500;pointer-events:none;white-space:nowrap;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* INSTALL BANNER */
    .ibanner{
      margin:0 16px 14px;
      background:var(--accent-dim);border:1px solid rgba(245,166,35,.4);
      border-radius:12px;padding:12px 14px;
      display:flex;align-items:center;gap:10px;
    }
    .ib-text{flex:1}
    .ib-title{font-size:13px;font-weight:700;margin-bottom:2px}
    .ib-sub{font-size:11px;color:var(--muted);line-height:1.4}
    .ib-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 4px;flex-shrink:0}

    /* HISTORY */
    .hempty{text-align:center;padding:60px 20px;color:var(--muted)}
    .hempty .ico{font-size:38px;margin-bottom:12px}
    .hempty p{font-size:14px;line-height:1.6}
    .hitem{
      background:var(--card);border:1px solid var(--border);
      border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;
      transition:border-color .2s;
    }
    .hitem:active{border-color:var(--accent)}
    .hi-date{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:6px}
    .hi-times{display:flex;gap:16px;margin-bottom:8px}
    .hi-t{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--muted)}
    .hi-tv{color:var(--text);font-weight:600}
    .hi-tags{display:flex;flex-wrap:wrap;gap:5px}
    .htag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--accent-dim);color:var(--accent)}
    .htag.empty{background:rgba(122,139,168,.1);color:var(--muted)}

    /* MODAL */
    .moverlay{
      position:fixed;inset:0;background:rgba(0,0,0,.7);
      z-index:300;display:none;align-items:flex-end;
    }
    .moverlay.open{display:flex}
    .modal{
      background:var(--card);border-radius:20px 20px 0 0;
      width:100%;max-width:430px;margin:0 auto;
      padding:18px 18px 36px;max-height:82vh;overflow-y:auto;
    }
    .mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
    .mdate{font-size:18px;font-weight:700;margin-bottom:16px}
    .msec{margin-bottom:14px}
    .mlabel{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600;letter-spacing:.08em;margin-bottom:8px}
    .mtimes{display:flex;gap:10px}
    .mtime-box{background:var(--card2);border-radius:10px;padding:10px;flex:1;text-align:center}
    .mtime-box .ml{font-size:11px;color:var(--muted);margin-bottom:2px}
    .mtime-box .mv{font-size:20px;font-weight:700}
    .msubj{background:var(--card2);border-radius:10px;padding:12px 14px;margin-bottom:8px}
    .msubj .mn{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px}
    .msubj .mnote{font-size:13px;line-height:1.5;color:var(--muted)}
    .msubj .mnote.ok{color:var(--text)}
    .mclose{
      width:100%;padding:14px;background:var(--card2);
      color:var(--muted);font-size:15px;font-weight:600;font-family:inherit;
      border:none;border-radius:12px;cursor:pointer;margin-top:10px;
    }

    /* SETTINGS */
    .set-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
    .set-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);gap:12px}
    .set-row:last-child{border-bottom:none}
    .set-rlabel{font-size:13px;color:var(--muted);min-width:44px}
    input.set-inp{background:transparent;border:none;color:var(--text);font-size:15px;font-weight:600;font-family:inherit;flex:1;outline:none}
    .set-save{
      width:100%;padding:16px;background:var(--card);
      border:1px solid var(--accent);color:var(--accent);
      font-size:15px;font-weight:700;font-family:inherit;
      border-radius:14px;cursor:pointer;margin-top:6px;
    }
    .set-save:active{background:var(--accent-dim)}
    .danger-box{
      background:rgba(224,107,107,.08);border:1px solid rgba(224,107,107,.22);
      border-radius:14px;padding:14px 16px;
    }
    .dtitle{font-size:13px;font-weight:600;color:var(--red);margin-bottom:4px}
    .ddesc{font-size:12px;color:var(--muted);margin-bottom:10px}
    .dbtn{
      background:transparent;border:1px solid var(--red);color:var(--red);
      font-size:13px;font-family:inherit;padding:8px 16px;border-radius:8px;cursor:pointer;
    }

    /* STREAK */
    .streak-bar{
      display:flex;gap:5px;margin-bottom:18px;padding:0 2px;
    }
    .streak-dot{
      flex:1;height:4px;border-radius:2px;background:var(--border);
      transition:background .3s;
    }
    .streak-dot.done{background:var(--accent)}

    /* Stats summary */
    .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
    .stat-val{font-size:22px;font-weight:700;color:var(--accent)}
    .stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}

    /* CHARTS */
    .chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
    .chart-title{font-size:13px;font-weight:700;margin-bottom:14px;color:var(--text)}
    .chart-title span{color:var(--accent)}
    .chart-wrap{width:100%;overflow:hidden}
    .chart-wrap svg{width:100%;display:block}
    .chart-legend{display:flex;gap:14px;margin-top:10px}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
    .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .no-data{text-align:center;padding:30px;color:var(--muted);font-size:13px}
  </style>
</head>
<body>

<div class="header">
  <div class="hd-date" id="hdate"></div>
  <div class="hd-title" id="htitle">오늘의 기록</div>
  <div class="hd-sub" id="hsub"></div>
</div>

<div class="ibanner" id="ibanner" style="display:none">
  <div class="ib-text">
    <div class="ib-title">📱 홈 화면에 추가하기</div>
    <div class="ib-sub">Safari → 공유 버튼 → "홈 화면에 추가"<br>안드로이드 → Chrome → 메뉴 → "앱 설치"</div>
  </div>
  <button class="ib-close" onclick="dismissBanner()">✕</button>
</div>

<!-- TODAY -->
<div id="screen-today" class="screen active">
  <div class="streak-bar" id="streakBar"></div>

  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat-box">
      <div class="stat-val" id="statDays">0</div>
      <div class="stat-lbl">이번 주 기록일</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statHours">0h</div>
      <div class="stat-lbl">오늘 총 공부시간</div>
    </div>
  </div>

  <div class="section">
    <div class="slabel">⏰ 수면 시간</div>
    <div class="time-row">
      <div class="tcard">
        <div class="tcard-label">🌅 기상 시간</div>
        <input type="time" class="tinput" id="wakeTime">
      </div>
      <div class="tcard">
        <div class="tcard-label">🌙 취침 시간</div>
        <input type="time" class="tinput" id="sleepTime">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="slabel">📚 과목별 공부 기록</div>
    <div id="subjectCards"></div>
  </div>

  <button class="save-btn" onclick="saveToday()">오늘 기록 저장</button>
</div>

<!-- HISTORY -->
<div id="screen-history" class="screen">
  <div id="historyList"></div>
</div>

<!-- SETTINGS -->
<div id="screen-settings" class="screen">
  <div class="section">
    <div class="slabel">📖 과목 이름</div>
    <div class="set-card" id="subjectSettings"></div>
    <button class="set-save" onclick="saveSettings()">과목 이름 저장</button>
  </div>
  <div class="section">
    <div class="slabel">⚠️ 데이터 관리</div>
    <div class="danger-box">
      <div class="dtitle">전체 기록 삭제</div>
      <div class="ddesc">저장된 모든 기록이 삭제돼요. 복구할 수 없어요.</div>
      <button class="dbtn" onclick="clearAll()">전부 삭제</button>
    </div>
  </div>
</div>

<!-- STATS -->
<div id="screen-stats" class="screen">
  <div id="statCharts"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bnav">
  <div class="ni active" onclick="switchScreen('today',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    오늘
  </div>
  <div class="ni" onclick="switchScreen('history',this)">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    기록
  </div>
  <div class="ni" onclick="switchScreen('stats',this)">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    통계
  </div>
  <div class="ni" onclick="switchScreen('settings',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    설정
  </div>
</div>

<!-- MODAL -->
<div class="moverlay" id="moverlay" onclick="closeMOverlay(event)">
  <div class="modal" id="mContent"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────
let subjects = JSON.parse(localStorage.getItem('subjects') || '["과목1","과목2","과목3"]');
let records  = JSON.parse(localStorage.getItem('records')  || '{}');

// ── INIT ───────────────────────────────────────────
function init() {
  updateHeader();
  renderSubjectCards();
  loadTodayData();
  renderStreak();
  renderSubjectSettings();
  showBanner();
  injectManifest();
}

function injectManifest() {
  const m = {
    name:"승진 공부 기록", short_name:"공부기록",
    start_url:"./", display:"standalone",
    background_color:"#0F1724", theme_color:"#0F1724",
    icons:[{
      src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230F1724'/%3E%3Ctext x='12' y='80' font-size='75'%3E📚%3C/text%3E%3C/svg%3E",
      sizes:"192x192", type:"image/svg+xml"
    }]
  };
  const blob = new Blob([JSON.stringify(m)], {type:'application/json'});
  const el = document.createElement('link');
  el.rel = 'manifest'; el.href = URL.createObjectURL(blob);
  document.head.appendChild(el);
}

// ── HEADER ─────────────────────────────────────────
function updateHeader(title) {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('hdate').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
  if (title) {
    document.getElementById('htitle').textContent = title;
  } else {
    document.getElementById('htitle').textContent = '오늘의 기록';
  }
  const h = now.getHours();
  document.getElementById('hsub').textContent =
    h < 6  ? '아직 새벽이에요 🌙' :
    h < 12 ? '좋은 아침이에요 ☀️' :
    h < 18 ? '열심히 하고 있군요 💪' :
              '오늘도 수고했어요 🌙';
}

// ── STREAK (last 7 days) ───────────────────────────
function renderStreak() {
  const bar = document.getElementById('streakBar');
  bar.innerHTML = '';
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = dateKey(d);
    const dot = document.createElement('div');
    dot.className = 'streak-dot' + (records[key] ? ' done' : '');
    dot.title = key;
    bar.appendChild(dot);
  }
  // Stats
  updateStats();
}

function updateStats() {
  const today = todayKey();
  const r = records[today];
  let daysThisWeek = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    if (records[dateKey(d)]) daysThisWeek++;
  }
  if (Object.keys(records).length > 0) {
    document.getElementById('statsRow').style.display = 'grid';
    document.getElementById('statDays').textContent = daysThisWeek;
    const totalMins = r
      ? (r.timeFrom || []).reduce((acc, from, i) => acc + (calcDuration(from, r.timeTo?.[i] || '') || 0), 0)
      : 0;
    document.getElementById('statHours').textContent = totalMins > 0 ? fmtDuration(totalMins) : '-';
  }
}

// ── SUBJECTS ───────────────────────────────────────
function renderSubjectCards() {
  document.getElementById('subjectCards').innerHTML = subjects.map((name, i) => `
    <div class="scard">
      <div class="sc-head">
        <div class="sc-name">${name}</div>
        <div class="sc-badge">과목 ${i+1}</div>
      </div>
      <textarea class="snote" id="note_${i}" placeholder="오늘 공부한 범위나 내용을 기록해요" rows="2"></textarea>
      <div class="fromto-row">
        <span class="fromto-label">⏱</span>
        <input type="time" class="ftime" id="from_${i}" oninput="onTimeChange(${i})">
        <span class="fromto-arrow">→</span>
        <input type="time" class="ftime" id="to_${i}" oninput="onTimeChange(${i})">
        <span class="dur-badge empty" id="dur_${i}">-</span>
      </div>
    </div>
  `).join('');
}

function renderSubjectSettings() {
  document.getElementById('subjectSettings').innerHTML = subjects.map((name, i) => `
    <div class="set-row">
      <div class="set-rlabel">${i+1}과목</div>
      <input type="text" class="set-inp" id="sn_${i}" value="${name}" placeholder="과목 이름">
    </div>
  `).join('');
}

function saveSettings() {
  subjects = subjects.map((_, i) => {
    const v = document.getElementById(`sn_${i}`).value.trim();
    return v || `과목${i+1}`;
  });
  localStorage.setItem('subjects', JSON.stringify(subjects));
  renderSubjectCards();
  loadTodayData();
  showToast('과목 이름 저장됐어요 ✓');
}

// ── TODAY DATA ──────────────────────────────────────
function todayKey() { return dateKey(new Date()); }

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadTodayData() {
  const r = records[todayKey()];
  if (!r) return;
  if (r.wakeTime)  document.getElementById('wakeTime').value  = r.wakeTime;
  if (r.sleepTime) document.getElementById('sleepTime').value = r.sleepTime;
  subjects.forEach((_, i) => {
    const n = document.getElementById(`note_${i}`);
    const f = document.getElementById(`from_${i}`);
    const t = document.getElementById(`to_${i}`);
    if (n && r.notes?.[i] !== undefined) n.value = r.notes[i];
    if (f && r.timeFrom?.[i]) f.value = r.timeFrom[i];
    if (t && r.timeTo?.[i])   t.value = r.timeTo[i];
    onTimeChange(i);
  });
}

function saveToday() {
  const timeFrom = subjects.map((_, i) => document.getElementById(`from_${i}`)?.value || '');
  const timeTo   = subjects.map((_, i) => document.getElementById(`to_${i}`)?.value   || '');
  const hours    = subjects.map((_, i) => {
    const mins = calcDuration(timeFrom[i], timeTo[i]);
    return mins !== null ? +(mins / 60).toFixed(2) : '';
  });
  records[todayKey()] = {
    wakeTime:  document.getElementById('wakeTime').value,
    sleepTime: document.getElementById('sleepTime').value,
    notes: subjects.map((_, i) => document.getElementById(`note_${i}`)?.value || ''),
    timeFrom, timeTo, hours,
    savedAt: new Date().toISOString()
  };
  localStorage.setItem('records', JSON.stringify(records));
  renderStreak();
  showToast('저장 완료 ✓');
}

// ── HISTORY ────────────────────────────────────────
function renderHistory() {
  const keys = Object.keys(records).sort((a,b) => b.localeCompare(a));
  const el = document.getElementById('historyList');
  if (!keys.length) {
    el.innerHTML = `<div class="hempty"><div class="ico">📖</div><p>아직 기록이 없어요.<br>오늘 공부를 기록해봐요!</p></div>`;
    return;
  }
  el.innerHTML = keys.map(key => {
    const r = records[key];
    const date = fmtDate(key);
    const tags = subjects.map((name, i) => {
      const filled = r.notes?.[i]?.trim();
      return `<span class="htag ${filled?'':'empty'}">${name}</span>`;
    }).join('');
    return `
      <div class="hitem" onclick="openDetail('${key}')">
        <div class="hi-date">${date}</div>
        <div class="hi-times">
          <div class="hi-t">🌅 <span class="hi-tv">${r.wakeTime  || '-'}</span></div>
          <div class="hi-t">🌙 <span class="hi-tv">${r.sleepTime || '-'}</span></div>
        </div>
        <div class="hi-tags">${tags}</div>
      </div>
    `;
  }).join('');
}

function fmtDate(key) {
  const [y,m,d] = key.split('-').map(Number);
  const date = new Date(y, m-1, d);
  const days = ['일','월','화','수','목','금','토'];
  if (key === todayKey()) return `오늘 · ${m}월 ${d}일 (${days[date.getDay()]})`;
  return `${m}월 ${d}일 (${days[date.getDay()]})`;
}

function openDetail(key) {
  const r = records[key];
  const subs = subjects.map((name, i) => {
    const note = r.notes?.[i] || '';
    const from = r.timeFrom?.[i] || '';
    const to   = r.timeTo?.[i]   || '';
    const mins = calcDuration(from, to);
    const timeStr = from && to
      ? `${from} → ${to}${mins ? ' · ' + fmtDuration(mins) : ''}`
      : '';
    return `
      <div class="msubj">
        <div class="mn">${name}${timeStr ? ` <span style="color:var(--muted);font-size:11px;font-weight:400">${timeStr}</span>` : ''}</div>
        <div class="mnote${note.trim()?' ok':''}">${note.trim() || '기록 없음'}</div>
      </div>
    `;
  }).join('');
  document.getElementById('mContent').innerHTML = `
    <div class="mhandle"></div>
    <div class="mdate">${fmtDate(key)}</div>
    <div class="msec">
      <div class="mlabel">수면</div>
      <div class="mtimes">
        <div class="mtime-box"><div class="ml">🌅 기상</div><div class="mv">${r.wakeTime||'-'}</div></div>
        <div class="mtime-box"><div class="ml">🌙 취침</div><div class="mv">${r.sleepTime||'-'}</div></div>
      </div>
    </div>
    <div class="msec">
      <div class="mlabel">과목별 기록</div>
      ${subs}
    </div>
    <button class="mclose" onclick="document.getElementById('moverlay').classList.remove('open')">닫기</button>
  `;
  document.getElementById('moverlay').classList.add('open');
}

function closeMOverlay(e) {
  if (e.target === document.getElementById('moverlay'))
    document.getElementById('moverlay').classList.remove('open');
}

// ── STATS CHARTS ───────────────────────────────────
function renderStats() {
  const container = document.getElementById('statCharts');
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    days.push(dateKey(d));
  }
  const dayLabels = days.map(k => {
    const [y,m,d] = k.split('-').map(Number);
    const names = ['일','월','화','수','목','금','토'];
    return names[new Date(y,m-1,d).getDay()];
  });

  const hasAny = days.some(k => records[k]);
  if (!hasAny) {
    container.innerHTML = `<div class="no-data">📊<br><br>기록이 쌓이면<br>그래프가 나타나요</div>`;
    return;
  }

  // ── 공부 시간 데이터
  const studyMins = days.map(k => {
    const r = records[k];
    if (!r || !r.timeFrom) return 0;
    return r.timeFrom.reduce((acc, from, i) => acc + (calcDuration(from, r.timeTo?.[i]||'') || 0), 0);
  });
  const maxStudy = Math.max(...studyMins, 60);

  // ── 기상/취침 시간 데이터 (분 단위)
  function timeToMins(t) {
    if (!t) return null;
    const [h,m] = t.split(':').map(Number);
    return h * 60 + m;
  }
  const wakeMins  = days.map(k => timeToMins(records[k]?.wakeTime));
  const sleepMins = days.map(k => {
    const m = timeToMins(records[k]?.sleepTime);
    // 취침이 자정 전이면 +24h로 처리 (예: 23:00 = 23*60)
    return m;
  });

  const allTimes = [...wakeMins, ...sleepMins].filter(v => v !== null);
  const minT = allTimes.length ? Math.max(0, Math.min(...allTimes) - 60) : 0;
  const maxT = allTimes.length ? Math.min(1500, Math.max(...allTimes) + 60) : 1440;

  // SVG 크기
  const W = 320, H = 150, padL = 36, padR = 10, padT = 10, padB = 28;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const step = innerW / 6;

  // ── 막대그래프 (공부시간)
  const bars = days.map((_, i) => {
    const mins = studyMins[i];
    const bh = mins > 0 ? Math.max(4, (mins / maxStudy) * innerH) : 0;
    const x = padL + i * step - 12;
    const y = padT + innerH - bh;
    const label = mins > 0 ? (mins >= 60 ? `${Math.floor(mins/60)}h${mins%60>0?mins%60+'m':''}` : `${mins}m`) : '';
    return `
      <rect x="${x}" y="${y}" width="24" height="${bh}" rx="4"
        fill="${mins>0?'var(--accent)':'var(--border)'}"/>
      ${mins>0?`<text x="${x+12}" y="${y-4}" text-anchor="middle" font-size="8" fill="var(--accent)">${label}</text>`:''}
    `;
  }).join('');

  const xLabels = dayLabels.map((lbl, i) => {
    const x = padL + i * step;
    return `<text x="${x}" y="${H-6}" text-anchor="middle" font-size="10" fill="var(--muted)">${lbl}</text>`;
  }).join('');

  // Y축 눈금 (공부시간)
  const yTicks = [0, 0.5, 1].map(p => {
    const mins = Math.round(p * maxStudy);
    const label = mins >= 60 ? `${Math.floor(mins/60)}h` : `${mins}m`;
    const y = padT + innerH - p * innerH;
    return `
      <line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3"/>
      <text x="${padL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="var(--muted)">${label}</text>
    `;
  }).join('');

  const barSVG = `
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      ${yTicks}
      ${bars}
      <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+innerH}" stroke="var(--border)" stroke-width="1"/>
      <line x1="${padL}" y1="${padT+innerH}" x2="${W-padR}" y2="${padT+innerH}" stroke="var(--border)" stroke-width="1"/>
      ${xLabels}
    </svg>
  `;

  // ── 꺾은선 그래프 (기상/취침)
  function tToY(mins) {
    return padT + innerH - ((mins - minT) / (maxT - minT)) * innerH;
  }
  function tLabel(mins) {
    const h = Math.floor(mins/60);
    const m = mins%60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }

  function makeLine(data, color) {
    const pts = data.map((v,i) => v !== null ? `${padL + i*step},${tToY(v)}` : null).filter(Boolean);
    if (pts.length < 2) return '';
    // 연결선
    let path = '';
    let prev = null;
    data.forEach((v, i) => {
      if (v === null) { prev = null; return; }
      const x = padL + i * step;
      const y = tToY(v);
      if (prev !== null) path += `<line x1="${prev.x}" y1="${prev.y}" x2="${x}" y2="${y}" stroke="${color}" stroke-width="2" opacity="0.6"/>`;
      prev = {x, y};
    });
    // 점
    const dots = data.map((v,i) => v===null?'': `<circle cx="${padL+i*step}" cy="${tToY(v)}" r="4" fill="${color}" stroke="var(--card)" stroke-width="2"/>`).join('');
    return path + dots;
  }

  // Y축 눈금 (시간)
  const yTickCount = 3;
  const timeRange = maxT - minT;
  const tickStep = Math.ceil(timeRange / yTickCount / 60) * 60;
  const firstTick = Math.ceil(minT / tickStep) * tickStep;
  let timeTicks = '';
  for (let t = firstTick; t <= maxT; t += tickStep) {
    const y = tToY(t);
    if (y < padT || y > padT + innerH) continue;
    timeTicks += `
      <line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3"/>
      <text x="${padL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="var(--muted)">${tLabel(t)}</text>
    `;
  }

  const lineSVG = `
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      ${timeTicks}
      ${makeLine(wakeMins, '#F5A623')}
      ${makeLine(sleepMins, '#7B6FE8')}
      <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+innerH}" stroke="var(--border)" stroke-width="1"/>
      <line x1="${padL}" y1="${padT+innerH}" x2="${W-padR}" y2="${padT+innerH}" stroke="var(--border)" stroke-width="1"/>
      ${xLabels}
    </svg>
  `;

  // 주간 요약
  const totalStudyH = studyMins.reduce((a,b)=>a+b,0);
  const studyDays = studyMins.filter(m=>m>0).length;
  const avgMins = studyDays > 0 ? Math.round(totalStudyH / studyDays) : 0;

  container.innerHTML = `
    <div class="chart-card">
      <div class="chart-title">📊 일별 공부 시간 <span>(최근 7일)</span></div>
      <div class="chart-wrap">${barSVG}</div>
      <div style="display:flex;gap:16px;margin-top:10px">
        <div class="stat-box" style="flex:1;padding:10px 12px">
          <div class="stat-val" style="font-size:18px">${fmtDuration(totalStudyH)}</div>
          <div class="stat-lbl">7일 총 공부</div>
        </div>
        <div class="stat-box" style="flex:1;padding:10px 12px">
          <div class="stat-val" style="font-size:18px">${fmtDuration(avgMins)}</div>
          <div class="stat-lbl">일 평균 (기록일 기준)</div>
        </div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-title">🌅 기상 · 취침 시간 <span>(최근 7일)</span></div>
      <div class="chart-wrap">${lineSVG}</div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#F5A623"></div>기상 시간</div>
        <div class="legend-item"><div class="legend-dot" style="background:#7B6FE8"></div>취침 시간</div>
      </div>
    </div>
  `;
}

// ── NAVIGATION ─────────────────────────────────────
function switchScreen(name, el) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  el.classList.add('active');
  const titles = {today:'오늘의 기록', history:'공부 기록', stats:'통계', settings:'설정'};
  updateHeader(titles[name]);
  if (name === 'history') renderHistory();
  if (name === 'stats') renderStats();
  if (name === 'settings') renderSubjectSettings();
}

// ── DURATION CALC ──────────────────────────────────
function calcDuration(from, to) {
  if (!from || !to) return null;
  const [fh, fm] = from.split(':').map(Number);
  const [th, tm] = to.split(':').map(Number);
  let mins = (th * 60 + tm) - (fh * 60 + fm);
  if (mins < 0) mins += 24 * 60; // 자정 넘어가는 경우
  return mins;
}

function fmtDuration(mins) {
  if (!mins || mins <= 0) return '-';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  if (h === 0) return `${m}분`;
  if (m === 0) return `${h}시간`;
  return `${h}시간 ${m}분`;
}

function onTimeChange(i) {
  const from = document.getElementById(`from_${i}`)?.value;
  const to   = document.getElementById(`to_${i}`)?.value;
  const mins = calcDuration(from, to);
  const badge = document.getElementById(`dur_${i}`);
  if (!badge) return;
  const label = fmtDuration(mins);
  badge.textContent = label;
  badge.className = `dur-badge${label === '-' ? ' empty' : ''}`;
}

// ── UTILS ──────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showBanner() {
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (!localStorage.getItem('bannerOff') && !isStandalone)
    document.getElementById('ibanner').style.display = 'flex';
}

function dismissBanner() {
  localStorage.setItem('bannerOff','1');
  document.getElementById('ibanner').style.display = 'none';
}

function clearAll() {
  if (confirm('모든 기록을 삭제할까요? 복구가 불가능해요.')) {
    localStorage.removeItem('records');
    records = {};
    renderStreak();
    showToast('전체 기록 삭제됐어요');
  }
}

// ── START ──────────────────────────────────────────
init();
</script>
